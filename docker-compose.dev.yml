# Development toolchain — Node 22 + Go 1.25. No host Node/Go required.
#
# First time:
#   ./docker.sh npm install
#   ./docker.sh npm run build
#   ./docker.sh npm run build:gate
#
# Or: npm run docker:setup

services:
  toolchain:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - costgate_node_modules:/app/node_modules
      - costgate_go_mod:/go/pkg/mod
      - ${HOME}/.costgate:/root/.costgate
      - ${HOME}/.cursor:/root/.cursor
    environment:
      COSTGATE_HOST_ROOT: ${PWD}
      COSTGATE_HOST_CONFIG: ${HOME}/.costgate/backends.json
      COSTGATE_HOST_PROBE_LOG_DIR: ${HOME}/.costgate/logs
      GOMODCACHE: /go/pkg/mod
      GOFLAGS: -buildvcs=false

  # Legacy aliases (delegate to toolchain)
  dev:
    extends:
      service: toolchain
    command: sleep infinity

  go:
    extends:
      service: toolchain

volumes:
  costgate_node_modules:
  costgate_go_mod:
