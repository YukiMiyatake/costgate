<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CostGate Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>CostGate Dashboard</h1>
    <p class="subtitle">localhost · Phase 29 · <span id="write-mode">…</span></p>
  </header>

  <div id="workspace-bar" class="workspace-bar">
    <label>
      Workspace
      <select id="workspace-select"></select>
    </label>
    <button type="button" id="workspace-pin-btn" class="btn-sm">Pin folder</button>
    <button type="button" id="workspace-refresh-btn" class="btn-sm">Refresh</button>
    <span id="workspace-path" class="note"></span>
    <p id="workspace-help" class="note workspace-help"></p>
  </div>

  <div id="token-bar" class="token-bar hidden">
    <label>Write token <input type="password" id="dash-token" placeholder="COSTGATE_DASHBOARD_TOKEN" /></label>
  </div>

  <nav id="tabs">
    <button type="button" data-tab="overview" class="active">Overview</button>
    <button type="button" data-tab="tools">Tools</button>
    <button type="button" data-tab="mcps">MCPs</button>
    <button type="button" data-tab="recommendations">Recommendations</button>
    <button type="button" data-tab="add-mcp">Add MCP</button>
  </nav>

  <main>
    <section id="panel-overview" class="panel active">
      <div id="overview-cards" class="cards"></div>
      <p class="note" id="overview-note"></p>
    </section>

    <section id="panel-tools" class="panel">
      <div id="tools-blind" class="banner hidden"></div>
      <table>
        <thead>
          <tr>
            <th>Tool</th>
            <th>Backend</th>
            <th>Tier</th>
            <th>Calls</th>
            <th>Last used</th>
            <th>List tokens</th>
            <th>Flag</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="tools-body"></tbody>
      </table>
    </section>

    <section id="panel-mcps" class="panel">
      <table>
        <thead>
          <tr>
            <th>Server</th>
            <th>Role</th>
            <th>Measured</th>
            <th>Command</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="mcps-body"></tbody>
      </table>
    </section>

    <section id="panel-recommendations" class="panel">
      <div id="rec-sections"></div>
      <ul id="rec-list" class="rec-list"></ul>
      <p id="rec-empty" class="note hidden">No recommendations for the current window.</p>
    </section>

    <section id="panel-add-mcp" class="panel">
      <div class="wizard-toolbar">
        <label>
          Search
          <input type="search" id="marketplace-search" placeholder="browser, github, postgres…" />
        </label>
        <button type="button" id="marketplace-search-btn" class="btn-sm">Search</button>
        <label>
          Sort
          <select id="marketplace-sort">
            <option value="name">Name</option>
            <option value="popularity">Popularity</option>
            <option value="reduction">Reduction %</option>
          </select>
        </label>
      </div>
      <div id="marketplace-categories" class="marketplace-categories"></div>
      <div class="marketplace-filters">
        <label><input type="checkbox" id="filter-gate-only" /> Gate ready only</label>
        <label><input type="checkbox" id="filter-official-only" /> Official only</label>
        <label><input type="checkbox" id="filter-hide-secrets" /> No secrets required</label>
      </div>
      <div id="marketplace-results" class="marketplace-grid"></div>
      <div id="wizard-form" class="wizard-form hidden">
        <h2 id="wizard-title"></h2>
        <p id="wizard-desc" class="note"></p>
        <div id="wizard-env-fields"></div>
        <div id="wizard-estimate" class="wizard-estimate"></div>
        <p id="wizard-hint" class="note hidden"></p>
        <div class="wizard-actions">
          <button type="button" id="wizard-back" class="btn-sm">Back</button>
          <button type="button" id="wizard-confirm" class="btn-sm btn-primary">Add MCP</button>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span id="health-status">Loading…</span>
  </footer>

  <script src="/app.js" type="module"></script>
</body>
</html>
