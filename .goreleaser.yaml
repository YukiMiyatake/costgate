version: 2

project_name: costgate-gate

before:
  hooks:
    - bash -c "cd packages/gate && CGO_ENABLED=0 go mod tidy && CGO_ENABLED=0 go test ./..."

builds:
  - id: costgate-gate
    dir: packages/gate
    main: ./cmd/costgate-gate
    binary: costgate-gate
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/YukiMiyatake/costgate/packages/gate/internal/version.Version={{.Version}}
      - -X github.com/YukiMiyatake/costgate/packages/gate/internal/version.Commit={{.ShortCommit}}

archives:
  - id: costgate-gate
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - packages/gate/README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: YukiMiyatake
    name: costgate

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
