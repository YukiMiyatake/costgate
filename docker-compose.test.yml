# CI / integration test skeleton — run with:
#   docker compose -f docker-compose.test.yml run --rm test-runner
#
# Probe/Gate are spawned as subprocesses inside test-runner (stdio MCP).
# mock-mcp is reserved for future HTTP-side fixtures if needed.

services:
  mock-mcp:
    build:
      context: ./test/fixtures/mock-mcp
    profiles: ["test"]

  test-runner:
    build:
      context: ./test
    volumes:
      - .:/app
      - costgate_test_node_modules:/app/node_modules
    working_dir: /app
    depends_on:
      mock-mcp:
        condition: service_started
    profiles: ["test"]

volumes:
  costgate_test_node_modules:
