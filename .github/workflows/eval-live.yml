name: Eval Live (optional)

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  eval-live:
    runs-on: ubuntu-latest
    if: ${{ secrets.GITHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: npm ci

      - name: Build Gate
        run: npm run build:gate

      - name: Accuracy eval (live GitHub)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSTGATE_CONFIG: ${{ github.workspace }}/examples/backends.github.json
        run: npm run eval:live
