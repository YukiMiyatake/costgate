name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript packages
        run: npm run build

      - name: Build Gate
        run: npm run build:gate

      - name: Gate unit tests
        working-directory: packages/gate
        run: go test ./...

      - name: Goreleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check

      - name: Token counter tests
        run: npm run test:tokens

      - name: Schema validation tests
        run: npm run test:schema

      - name: Integration tests (mock MCP)
        run: npm run test:integration

      - name: Accuracy eval (mock MCP)
        run: npm run eval

      - name: Benchmark CI (mock compare)
        run: npm run benchmark:ci

      - name: Filesystem MCP smoke
        run: npm run test:filesystem

      - name: Dashboard tests
        run: npm run dashboard:test

      - name: Script syntax check
        run: npm run check:syntax
