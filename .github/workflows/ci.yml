name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript packages
        run: npm run build

      - name: Build Gate
        run: npm run build:gate

      - name: Gate unit tests
        working-directory: packages/gate
        run: go test ./...

      - name: Script syntax check
        run: |
          node --check scripts/feat-workflow.mjs
          node --check scripts/compare-report.mjs
          node --check scripts/lib/mcp-client.mjs
          node --check scripts/lib/parse-probe-logs.mjs
          node --check scripts/session-report.mjs
          node --check scripts/cloud-upload.mjs
          node --check scripts/cursor-mcp.mjs
