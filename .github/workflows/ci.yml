name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript packages
        run: npm run build

      - name: Build Gate
        run: npm run build:gate

      - name: Gate unit tests
        working-directory: packages/gate
        run: go test ./...

      - name: Goreleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check

      - name: Token counter tests
        run: npm run test:tokens

      - name: Schema validation tests
        run: npm run test:schema

      - name: Integration tests (mock MCP)
        run: npm run test:integration

      - name: Accuracy eval (mock MCP)
        run: npm run eval

      - name: Benchmark CI (mock compare)
        run: npm run benchmark:ci

      - name: Filesystem MCP smoke
        run: npm run test:filesystem

      - name: Dashboard tests
        run: npm run test:dashboard:all

      - name: Script syntax check
        run: |
          node --check scripts/feat-workflow.mjs
          node --check scripts/compare-report.mjs
          node --check scripts/benchmark-ci.mjs
          node --check scripts/lib/mcp-client.mjs
          node --check scripts/lib/parse-probe-logs.mjs
          node --check scripts/lib/tokens.mjs
          node --check scripts/session-report.mjs
          node --check scripts/cloud-upload.mjs
          node --check scripts/cursor-mcp.mjs
          node --check scripts/cursor-update.mjs
          node --check scripts/docker-run.mjs
          node --check scripts/lib/paths.mjs
          node --check scripts/dashboard-server.mjs
          node --check scripts/lib/dashboard-data.mjs
          node --check scripts/lib/dashboard-control.mjs
          node --check scripts/lib/dashboard-marketplace.mjs
          node --check scripts/lib/dashboard-project-recommend.mjs
          node --check test/dashboard-api.test.mjs
          node --check test/dashboard-control.test.mjs
          node --check test/dashboard-marketplace.test.mjs
          node --check test/dashboard-project-recommend.test.mjs
          node --check scripts/lib/dashboard-workspaces.mjs
          node --check test/dashboard-workspaces.test.mjs
          node --check test/run.mjs
          node --check test/eval/run.mjs
          node --check test/fixtures/mock-filesystem-mcp/index.mjs
          node --check test/filesystem-mcp-smoke.mjs
