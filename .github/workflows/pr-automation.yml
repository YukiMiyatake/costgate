name: PR automation

# CI 通過後に squash auto-merge。PR 作成時に自動レビューコメントを投稿。
# リポジトリ設定で Settings → General → Allow auto-merge を ON にしてください。

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  review-and-automerge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post automated review
        if: github.event.action == 'opened' || github.event.action == 'ready_for_review'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          FILES=$(gh pr diff "$PR" --name-only | head -30)
          gh pr comment "$PR" --body "$(cat <<EOF
          ## Automated review

          CI（build + go test）が通過次第、**auto-merge（squash）** します。

          ### Changed files
          \`\`\`
          ${FILES}
          \`\`\`

          > Bot による自動チェック。問題があれば PR を Close するか \`gh pr merge --disable-auto\` を実行してください。
          EOF
          )"

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --auto --squash
