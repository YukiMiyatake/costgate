name: Cursor E2E Spot (optional)

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  cursor-e2e-spot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install dependencies
        run: npm ci

      - name: Build Gate
        run: npm run build:gate

      - name: Cursor E2E spot (mock proxy layer)
        run: npm run cursor:e2e:spot:smoke
