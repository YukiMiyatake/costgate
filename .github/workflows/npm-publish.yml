name: npm Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "npm version (e.g. 0.5.0) — workflow_dispatch only"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set package versions
        run: |
          node -e "
            const fs = require('fs');
            const ver = '${{ steps.ver.outputs.version }}';
            for (const pkg of ['packages/schema/package.json', 'packages/probe/package.json', 'packages/cli/package.json']) {
              const j = JSON.parse(fs.readFileSync(pkg, 'utf8'));
              j.version = ver;
              fs.writeFileSync(pkg, JSON.stringify(j, null, 2) + '\n');
            }
            const probe = JSON.parse(fs.readFileSync('packages/probe/package.json', 'utf8'));
            probe.dependencies['@costgate/schema'] = ver;
            fs.writeFileSync('packages/probe/package.json', JSON.stringify(probe, null, 2) + '\n');
          "

      - run: npm ci

      - name: Build publishable packages
        run: npm run build -w @costgate/schema && npm run build -w @costgate/probe && npm run build -w @costgate/cli

      - name: Wait for Gate release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          ASSET="costgate-gate_${VERSION}_linux_amd64.tar.gz"
          for attempt in $(seq 1 36); do
            if gh release view "$TAG" --repo YukiMiyatake/costgate --json assets --jq '.assets[].name' 2>/dev/null | grep -qx "$ASSET"; then
              echo "Gate release assets ready ($ASSET)"
              exit 0
            fi
            echo "waiting for Gate release ($attempt/36)..."
            sleep 10
          done
          echo "Gate release assets not found for $TAG after 6 minutes"
          exit 1

      - name: Publish @costgate/schema
        run: npm publish -w @costgate/schema --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @costgate/probe
        run: npm publish -w @costgate/probe --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @costgate/cli
        run: npm publish -w @costgate/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
